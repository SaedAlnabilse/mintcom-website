<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 40 40" shape-rendering="geometricPrecision">
  <g>
    <animateTransform attributeName="transform" type="rotate" from="0 20 20" to="360 20 20" dur="1s" repeatCount="indefinite" />
    <!-- Background Track -->
    <circle cx="20" cy="20" r="14" fill="none" stroke="#7dc6a2" stroke-width="3" stroke-opacity="0.15" />
    <!-- Spinning Arc – longer sweep for smoother visual -->
    <path d="M20 6 A 14 14 0 0 1 33.8 23.5" fill="none" stroke="#7dc6a2" stroke-width="3.5" stroke-linecap="round">
      <animate attributeName="stroke-dasharray" values="0 88;44 44;0 88" dur="1s" repeatCount="indefinite" />
    </path>
  </g>
</svg>
