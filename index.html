<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=5" />
  <script>
    (() => {
      try {
        const storageKey = 'paymint-ui-theme';
        const storedTheme = localStorage.getItem(storageKey) || 'system';
        const resolvedTheme = storedTheme === 'system'
          ? (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
          : storedTheme;
        const root = document.documentElement;
        root.classList.remove('light', 'dark');
        root.classList.add(resolvedTheme);
        root.style.colorScheme = resolvedTheme;
      } catch {
        // Ignore pre-hydration theme initialization failures.
      }
    })();
  </script>

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="/paymint-logo.svg" />
  <link rel="apple-touch-icon" sizes="180x180" href="/paymint-logo.png" />
  <link rel="security" href="/.well-known/security.txt" />

  <!-- Primary Meta Tags -->
  <title>PayMint | All-in-One Cloud POS & Business Management</title>
  <meta name="title" content="PayMint | All-in-One Cloud POS & Business Management" />
  <meta name="description" content="Simplify your business with PayMint. Fast sales, real-time inventory, and powerful analytics on any device. Start your 14-day free trial today." />

  <meta name="keywords" content="POS system, point of sale, restaurant POS, retail POS, inventory management, staff management, business software, payment processing" />
  <meta name="author" content="PayMint" />

  <!-- Allow Search Engine Indexing -->
  <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
  <meta name="googlebot" content="index, follow" />
  <meta name="bingbot" content="index, follow" />

  <!-- Canonical URL -->
  <link rel="canonical" href="https://paymintpos.net/" />

  <!-- Theme Colors -->
  <meta name="theme-color" content="#7CC39F" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#0F172A" media="(prefers-color-scheme: dark)" />

  <!-- iOS Web App -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="PayMint" />

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://paymintpos.net/" />
  <meta property="og:title" content="PayMint POS - Smart, Simple & Secure" />
  <meta property="og:description" content="PayMint is a modern POS system designed for fast, secure, and scalable business operations. Packed with advanced features at no extra cost." />
  <meta property="og:image" content="https://paymintpos.net/paymint-logo.png" />
  <meta property="og:site_name" content="PayMint" />
  <meta property="og:locale" content="en_US" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:url" content="https://paymintpos.net/" />
  <meta name="twitter:title" content="PayMint POS - Smart, Simple & Secure" />
  <meta name="twitter:description" content="PayMint is a modern POS system designed for fast, secure, and scalable business operations." />
  <meta name="twitter:image" content="https://paymintpos.net/paymint-logo.png" />

  <!-- Structured Data for SEO -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "SoftwareApplication",
    "name": "PayMint POS",
    "applicationCategory": "BusinessApplication",
    "operatingSystem": "Web, Android, iOS",
    "offers": {
      "@type": "Offer",
      "price": "0",
      "priceCurrency": "USD",
      "description": "14-day free trial"
    },
    "description": "PayMint is a complete 360 degree POS solution built for modern businesses. Manage sales, inventory, staff, reporting, and operations from one simple system.",
    "url": "https://paymintpos.net",
    "image": "https://paymintpos.net/paymint-logo.png",
    "author": {
      "@type": "Organization",
      "name": "PayMint",
      "url": "https://paymintpos.net",
      "email": "support@paymintpos.net",
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "customer support",
        "email": "support@paymintpos.net",
        "availableLanguage": ["English", "Arabic"]
      }
    }
  }
  </script>

  <!-- DNS Prefetch & Preconnect for Performance -->
  <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
  <link rel="dns-prefetch" href="https://player.vimeo.com" />
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <!-- Preload Critical Fonts -->
  <link rel="preload" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'" />
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" /></noscript>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
